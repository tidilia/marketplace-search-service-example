name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up environment and install dependencies
        run: uv sync

      - name: Run ruff lint
        run: uv run ruff check src/ bin/

      - name: Run ruff format check
        run: uv run ruff format --check src/ bin/

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up environment and install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v
